# ============================================================================
# Approach summary (≤200 words recommended)
# ============================================================================
methodology_summary: |
  Rule-based hybrid scorer built directly against the JD's stated priorities
  for "Senior AI Engineer — Founding Team".

  Scoring has four layers:
  1. Must-have capability score (retrieval/embeddings, vector DB, Python,
     evaluation frameworks) — weighted 78% of the capability signal.
     Each component requires BOTH a skill entry with meaningful duration_months
     AND corroborating career-history text, guarding against keyword stuffers.
  2. Nice-to-have score (LoRA/PEFT, LTR, distributed systems, open source)
     — weighted 22% of capability.
  3. Logistics multiplier (location, years-of-experience band, notice period)
     — scales capability score in [0.55, 1.0]; cannot manufacture fit from zero.
  4. Anti-pattern penalties (consulting-only career, title-chaser, keyword
     stuffer, CV/speech specialist, pure researcher, LLM-wrapper-only) applied
     as multiplicative factors before behavioral signals.
  5. Behavioral multiplier (open_to_work, recency, recruiter_response_rate,
     interview_completion_rate, offer_acceptance_rate, verified signals) —
     bounded to [0.4, 1.2].
  6. Honeypot detection excludes internally-inconsistent profiles from the top 100.

  Pure Python stdlib. No GPU, no network, no LLM calls. ~TODO: X seconds for 100K
  candidates on CPU.

